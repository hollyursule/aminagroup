<!DOCTYPE html>
<html>
<head>
    <title>Users Dashboard 👀</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(45deg,
                #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .card {
            width: 380px;
            padding: 30px;
            border-radius: 20px;

            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);

            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            color: white;
            text-align: center;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: rgba(255,255,255,0.2);
            margin: 8px 0;
            padding: 10px;
            border-radius: 10px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            padding: 6px 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .delete {
            background: #ff4d4d;
            color: white;
        }

        .back {
            margin-top: 15px;
            background: white;
            color: #bc1888;
            width: 100%;
        }

        .logout {
            margin-top: 10px;
            background: black;
            color: white;
            width: 100%;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Logged In Users 👀</h2>

    <ul id="userList"></ul>

    <button class="back" onclick="goBack()">⬅ Back</button>
    <button class="logout" onclick="logout()"> Logout</button>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];

function displayUsers() {
    let list = document.getElementById("userList");
    list.innerHTML = "";

    users.forEach((user, index) => {
        let li = document.createElement("li");

        li.innerHTML = `
            <span> ${user.email}<br><small>${user.time}</small></span>
            <button class="delete" onclick="deleteUser(${index})">X</button>
        `;

        list.appendChild(li);
    });
}

function deleteUser(index) {
    users.splice(index, 1);
    localStorage.setItem("users", JSON.stringify(users));
    displayUsers();
}

function goBack() {
    window.location.href = "login.html";
}

function logout() {
    window.location.href = "login.html";
}

displayUsers();
</script>

</body>
</html>
