<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Registration - Zaola</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #2a5298;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #16325c;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Product Registration</h2>

    <form>
        <label>Product Name</label>
        <input type="text" name="productName" placeholder="Enter product name" required>

        <label>Product ID</label>
        <input type="text" name="productId" placeholder="Enter unique ID" required>

        <label>Category</label>
        <select name="category" required>
            <option value="">-- Select Category --</option>
            <option>Electronics</option>
            <option>Clothing</option>
            <option>Food</option>
            <option>Furniture</option>
            <option>Other</option>
        </select>

        <label>Price ($)</label>
        <input type="number" name="price" min="0" step="0.01" required>

        <label>Quantity</label>
        <input type="number" name="quantity" min="1" required>

        <label>Manufacturing Date</label>
        <input type="date" name="mfgDate" required>

        <label>Expiry Date</label>
        <input type="date" name="expDate">

        <label>Description</label>
        <textarea name="description" rows="3" placeholder="Optional details..."></textarea>

        <button type="submit">Register Product</button>
    </form>

    <div class="footer">
        © 2026 Beta Tech Solutions | Zaola
    </div>
</div>

</body>
</html>
